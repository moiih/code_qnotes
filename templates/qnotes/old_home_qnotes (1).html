{% extends 'notes/base.html' %}

{% load static %}
{% block title %} Home: Qnotes {% endblock title %}
{% load widget_tweaks %}

{% block main %}

    <div style="position: absolute; width: 100%; height: 100%; background-image: linear-gradient(to right bottom, red, blue);"></div>

    <div class="flex_container">

        <!--<div class="grid_center" id="login_box" style="padding: 10px; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);">-->
        <div class="grid_center" id="login_box" style="padding: 10px; position: relative; margin-top: 30px; margin-right: 30px;">
            <div id="login_box_shadow">
                <h1 id="login-head">
                    Simple Linker
                </h1>

                {% if messages %}
                    {% for mg in messages %}
                        <span id="login-error" class="grid_center"> <b>&bull; {{ mg }} </b> </span>
                    {% endfor %}
                {% endif %}

                <hr class="my-4" style="color: black;">

                <form action="" method="POST" style="padding: 20px;" id="link-form">
                    {% csrf_token %}
                    <div class="input-container">
                        <input type="text" name="mycLink" id="cLink" required=""/>
                        <label for="cLink" style="color: black;"> <i class="far fa-user"></i> <b>Paste Link Here:</b> </label>
                    </div>

                    <div class="grid_center">
                        <!-- <input type="submit" value="Send Link" class="btn" id="login-btn"> -->
                        <button type="button" class="btn" id="login-btn" onclick="submitLink()"> Send Link </button>

                        <script>
                            function submitLink() {
                                //if ( document.getElementById('cLink').value.length == 0 || document.getElementById('cLink').value == null || document.getElementById('cLink').value == "" || document.getElementById('cLink').value.match(/\S/) ) {
                                console.log($.trim( $('#myInput').val()));
                                if ( $.trim( $('#cLink').val() ) == '' ) {  // Solid method to check Empty Input Field (by removing all whitespaces)
                                    alert('\nEmpty Link Not Allowed !!');
                                }
                                else {
                                    $('#link-form').submit();
                                }
                            }
                        </script>

                    </div>

                </form>
            </div>

            <div style="position: absolute; top: 90%;">
                <img src="{% static 'img/jerry.png' %}" height="550px" width="400px" alt="">
            </div>

        </div>


        <!-- <a href="{#% url 'change_password' %#}"> Change Password </a> -->



    </div>

{% endblock main %}
