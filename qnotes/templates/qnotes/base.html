{% load static %}

<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/stylesheet_notes.css' %}">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.0.2/anime.min.js"></script>

    <script src="//ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- // And also force a "HTTPS" protocol for below 'jQuery' script, intead of default "http" insure protocol -->
    <script src="https://code.jquery.com/jquery-3.5.1.js" integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://kit.fontawesome.com/b3c82137d2.js" crossorigin="anonymous"></script>



    <title>
      {% block title %}
        Code Notes
      {% endblock title %}
    </title>
</head>

<body>

  <!--Navbar-->
  <nav class="navbar navbar-dark bg-primary navbar-expand-md">

        <!-- Navbar brand -->
        <!-- <a class="navbar-brand" id="myNavTitle" href="#">Navbar</a> -->

        <!-- Collapse button -->
        <!-- <button class="navbar-toggler toggler-example" id="menu-toggle" type="button" style="color: rgb(255, 255, 255);" data-toggle="collapse" data-target="#navbarSupportedContent1"
          aria-controls="navbarSupportedContent1" aria-expanded="false" aria-label="Toggle navigation"> -->
        <button class="navbar-toggler toggler-example" id="menu-toggle" type="button" data-target="#navbarSupportedContent1">
            <span style="color: white;">
                <i class="fas fa-bars fa-1x" id="menu-open"></i>
                <i class="fas fa-times" id="menu-close"></i>
            </span>
        </button>


        <!-- Collapsible content -->
        <div class="collapse navbar-collapse" id="navbarSupportedContent1">

          <!-- Links -->
          <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
              <a id="qHome" class="btn btn-primary" href="{% url 'home' %}"> <i class="fas fa-house-user fa-lg"></i>&nbsp; Home </a>
            </li>


            {% if user.is_authenticated %}
              <!--<li class="nav-item active">-->
              <!--  <a href="{#% url 'login' %#}" class="btn btn-success"> Home </a>-->
              <!--</li> &nbsp; &nbsp;-->
            {#% else %#}

              <li class="nav-item active">
                <a id="qLog_Out" href="{% url 'logout' %}" class="btn btn-primary"> <i class="fas fa-arrow-circle-right fa-lg"></i>&nbsp; Log Out </a>
              </li>

              <li class="nav-item active">
                <a id="qChange_Pwd" href="{% url 'change_password' %}" class="btn btn-primary"> <i class="fas fa-cog fa-lg"></i>&nbsp; Change Password </a>
              </li>

            {% endif %}
          </ul>
          <!-- Links -->

        </div>
        <!-- Collapsible content -->

        <a class="navbar-brand" id="myNavTitle" href="{% url 'home' %}"> <span><i class="fas fa-bowling-ball"></i> Qnotes</span> </a>

  </nav>
  <!--/.Navbar-->


  {#% if name %#}
    <!-- <br>
    <p id="test" onclick="myClick()">{{ name }}</p>     -->
  {#% endif %#}




  <!-- <div style="background-image: linear-gradient(to right bottom, red, pink);"></div> -->
    {% block main %}  {% endblock main %}
  <!-- </div> -->

  <!-- <footer>
    <div class="footer grid_center">
      <span>&bull; Menu &bull;</span>
    </div>
  </footer> -->

  <script>
        var curr_url = window.location.href;
        //alert('New Alert.');

        if( String(curr_url) == 'https://qnotes23.pythonanywhere.com/' ) {      // For Active 'Home' Tab on Logged HomePage
            //alert('Its Home.');
            $('#qHome').css({'background-color': '#0069D9', 'font-weight': 'bold'});
        }
        else if( String(curr_url) == 'https://qnotes23.pythonanywhere.com/change_user_password/' ) {      // For Active 'Change Password' Tab
            //alert('Its Change.');
            $('#qChange_Pwd').css({'background-color': '#0069D9', 'font-weight': 'bold'});
        }
  </script>

</body>

    <script src="{% static 'js/script_notes.js' %}"></script>

</html>
